services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: crs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catholic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-catholic_ride_share}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catholic_user} -d ${POSTGRES_DB:-catholic_ride_share}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crs-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: crs-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crs-network

  # Backend API
  backend:
    image: ${DOCKER_USERNAME}/catholic-ride-share-backend:${TAG:-latest}
    container_name: crs-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["https://catholicrides.org", "https://www.catholicrides.org"]}
      # Email setup for Verification/Reset
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-}
      EMAILS_FROM_NAME: ${EMAILS_FROM_NAME:-}
      # Stripe donations (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crs-backend.rule=Host(`catholicrides.org`, `www.catholicrides.org`) && PathPrefix(`/api`, `/docs`, `/openapi.json`)"
      - "traefik.http.services.crs-backend.loadbalancer.server.port=8000"
    networks:
      - crs-network
      - dokploy-network

  # Celery Worker
  celery_worker:
    image: ${DOCKER_USERNAME}/catholic-ride-share-backend:${TAG:-latest}
    container_name: crs-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      # Email setup for Verification/Reset
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-}
      EMAILS_FROM_NAME: ${EMAILS_FROM_NAME:-}
      # Stripe donations (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app worker --loglevel=info
    networks:
      - crs-network

  # Frontend
  frontend:
    image: ${DOCKER_USERNAME}/catholic-ride-share-frontend:${TAG:-latest}
    container_name: crs-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${API_BASE_URL:-https://catholicrides.org/api/v1}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crs-frontend.rule=Host(`catholicrides.org`, `www.catholicrides.org`)"
      - "traefik.http.services.crs-frontend.loadbalancer.server.port=3000"
    networks:
      - crs-network
      - dokploy-network

volumes:
  postgres_data:
  redis_data:

networks:
  crs-network:
    driver: bridge
  dokploy-network:
    external: true
